<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Pruebas API Movimiento Inventario</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        h3 {
            margin-top: 20px;
            color: #555;
        }

        input, select, button {
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
        }

        button:hover {
            background-color: #0056b3;
        }

        hr {
            margin: 20px 0;
        }

        pre {
            background: #222;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            max-height: 300px;
        }
    </style>

</head>

<body>

<h2>Pruebas API Movimiento Inventario</h2>

<hr>

<h3>GET por ID</h3>
<input type="number" id="getId" placeholder="ID Movimiento">
<button onclick="testGetById()">Consultar</button>

<hr>

<h3>Listar movimientos</h3>
<button onclick="testBuscar()">Buscar</button>

<hr>

<h3>Crear Movimiento (POST)</h3>

<select id="postTipoMovimiento">
    <option value="">Tipo Movimiento</option>
    <option value="ENTRADA">ENTRADA</option>
    <option value="SALIDA">SALIDA</option>
    <option value="TRASNFERENCIA">TRASNFERENCIA</option>
</select>

<input type="number" id="postProductoId" placeholder="ID Producto">

<input type="number" id="postCantidad" placeholder="Cantidad">

<input type="number" id="postBodegaOrigen" placeholder="ID Bodega Origen">

<input type="number" id="postBodegaDestino" placeholder="ID Bodega Destino">

<button onclick="testPost()">Crear Movimiento</button>

<hr>

<pre id="resultado"></pre>

<script src="movimiento.js"></script>

<script>

function mostrar(data) {

    if (data && data.errorCode === "VALIDATION_FAILED" && data.errors) {

        let errores = "ERRORES DE VALIDACIÓN\n\n";

        for (const campo in data.errors) {
            errores += campo + ": " + data.errors[campo] + "\n";
        }

        document.getElementById("resultado").textContent = errores;
        return;
    }

    if (data instanceof Error) {
        document.getElementById("resultado").textContent = "Error: " + data.message;
        return;
    }

    document.getElementById("resultado").textContent =
        JSON.stringify(data, null, 2);
}


function testGetById() {

    const id = document.getElementById("getId").value;

    getMovimientoById(id)
        .then(data => mostrar(data))
        .catch(error => mostrar(error));
}


function testBuscar() {

    listarMovimientos()
        .then(data => mostrar(data))
        .catch(error => mostrar(error));
}


function testPost() {

    const tipoMovimiento =
        document.getElementById("postTipoMovimiento").value;

    const productoID =
        document.getElementById("postProductoId").value;

    const cantidadProducto =
        document.getElementById("postCantidad").value;

    const bodegaOrigenID =
        document.getElementById("postBodegaOrigen").value;

    const bodegaDestinoID =
        document.getElementById("postBodegaDestino").value;

    crearMovimiento(
        tipoMovimiento,
        productoID,
        cantidadProducto,
        bodegaOrigenID,
        bodegaDestinoID
    )
    .then(data => mostrar(data))
    .catch(error => mostrar(error));
}

</script>

</body>

</html>
